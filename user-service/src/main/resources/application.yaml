spring:
  application:
    name: user-service

server:
  port: 8081


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

info:
  app:
    name:"ShopEase User Service"
    version:"1.0.0"

logging:
  level:
    com.shopease: DEBUG
    org.springframework: INFO
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} - [%thread] %-5level %logger{36} - %msg%n"

shopease:
  user-service:
    max-users-per-page: 20
    default-role: CUSTOMER
